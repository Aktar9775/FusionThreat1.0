<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Login — Under Construction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090c;
  --bg2: #0d1013;
  --red: #C91D22;
  --red-glow: rgba(201,29,34,0.18);
  --steel: #a0a8b0;
  --dim: rgba(255,255,255,0.38);
  --text: rgba(255,255,255,0.87);
  --text-sec: rgba(255,255,255,0.52);
  --glass: rgba(255,255,255,0.025);
  --glass-border: rgba(255,68,68,0.12);
  --mono: 'Share Tech Mono', monospace;
  --head: 'Orbitron', sans-serif;
  --body: 'Inter', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── Grid background ── */
.grid-bg {
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(160,168,176,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(160,168,176,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, #000 30%, transparent 100%);
  z-index: 0;
}

/* ── Scan line ── */
.scan-line {
  position: fixed;
  left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--red), transparent);
  opacity: 0.18;
  animation: scan 5s linear infinite;
  z-index: 0;
}
@keyframes scan { from { top: 0; } to { top: 100%; } }

/* ── Glow blob ── */
.glow {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 300px;
  background: radial-gradient(ellipse, rgba(201,29,34,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Main card ── */
.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  padding: 48px 44px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  backdrop-filter: blur(12px);
  text-align: center;
  animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
  margin: 0 16px;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Logo ── */
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: var(--head);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: 0.04em;
  margin-bottom: 36px;
  animation: fadeUp 0.7s 0.05s cubic-bezier(.22,1,.36,1) both;
}
.logo strong { color: var(--red); font-weight: 700; }
.logo-shield {
  width: 32px; height: 32px;
  color: var(--steel);
}

/* ── Icon area ── */
.icon-wrap {
  position: relative;
  width: 88px;
  height: 88px;
  margin: 0 auto 28px;
  animation: fadeUp 0.7s 0.1s cubic-bezier(.22,1,.36,1) both;
}
.icon-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(201,29,34,0.2);
  animation: ringPulse 2.5s ease-in-out infinite;
}
.icon-ring-2 {
  position: absolute;
  inset: -10px;
  border-radius: 50%;
  border: 1px solid rgba(201,29,34,0.08);
  animation: ringPulse 2.5s ease-in-out infinite 0.4s;
}
@keyframes ringPulse {
  0%,100% { opacity: 0.5; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.05); }
}
.icon-circle {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: rgba(201,29,34,0.06);
  border: 1px solid rgba(201,29,34,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
}
.icon-circle svg {
  width: 38px;
  height: 38px;
  color: var(--red);
  opacity: 0.85;
}

/* ── Status tag ── */
.status-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--red);
  background: rgba(201,29,34,0.08);
  border: 1px solid rgba(201,29,34,0.2);
  border-radius: 4px;
  padding: 4px 12px;
  margin-bottom: 20px;
  animation: fadeUp 0.7s 0.15s cubic-bezier(.22,1,.36,1) both;
}
.blink-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--red);
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── Heading ── */
.heading {
  font-family: var(--head);
  font-size: clamp(20px, 4vw, 26px);
  font-weight: 700;
  letter-spacing: 0.02em;
  line-height: 1.2;
  margin-bottom: 14px;
  animation: fadeUp 0.7s 0.18s cubic-bezier(.22,1,.36,1) both;
}
.heading span { color: var(--red); }

/* ── Description ── */
.desc {
  font-size: 14px;
  color: var(--text-sec);
  line-height: 1.7;
  max-width: 340px;
  margin: 0 auto 32px;
  animation: fadeUp 0.7s 0.22s cubic-bezier(.22,1,.36,1) both;
}

/* ── Progress bar ── */
.progress-wrap {
  margin-bottom: 32px;
  animation: fadeUp 0.7s 0.26s cubic-bezier(.22,1,.36,1) both;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.progress-track {
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 68%;
  background: linear-gradient(90deg, var(--red), rgba(201,29,34,0.5));
  border-radius: 2px;
  position: relative;
  animation: fillBar 1.2s 0.5s cubic-bezier(.22,1,.36,1) both;
}
@keyframes fillBar {
  from { width: 0%; }
  to   { width: 68%; }
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
  animation: shimmer 1.8s ease-in-out infinite 1.5s;
}
@keyframes shimmer {
  0%   { opacity: 0; }
  50%  { opacity: 1; }
  100% { opacity: 0; }
}

/* ── Info rows ── */
.info-rows {
  display: flex;
  flex-direction: column;
  gap: 1px;
  margin-bottom: 32px;
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px;
  overflow: hidden;
  animation: fadeUp 0.7s 0.30s cubic-bezier(.22,1,.36,1) both;
}
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 16px;
  background: rgba(255,255,255,0.015);
  font-size: 12px;
}
.info-row:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.04); }
.info-row__label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--dim);
}
.info-row__val {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-sec);
}
.info-row__val.green { color: #4ade80; }
.info-row__val.yellow { color: #fbbf24; }
.info-row__val.red { color: var(--red); }

/* ── Notify form ── */
.notify-wrap {
  animation: fadeUp 0.7s 0.34s cubic-bezier(.22,1,.36,1) both;
}
.notify-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--dim);
  margin-bottom: 10px;
}
.notify-row {
  display: flex;
  gap: 8px;
}
.notify-input {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 7px;
  color: var(--text);
  font-family: var(--body);
  font-size: 13px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s ease;
}
.notify-input:focus { border-color: rgba(201,29,34,0.35); background: rgba(201,29,34,0.02); }
.notify-input::placeholder { color: var(--dim); }
.notify-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--head);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 7px;
  padding: 10px 18px;
  cursor: pointer;
  transition: opacity 0.2s ease, box-shadow 0.2s ease;
  white-space: nowrap;
}
.notify-btn:hover { opacity: 0.88; box-shadow: 0 0 18px var(--red-glow); }
.notify-btn:active { opacity: 0.75; }
.notify-success {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 12px;
  color: #4ade80;
  padding: 10px 0 0;
}

/* ── Back link ── */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 28px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--dim);
  text-decoration: none;
  transition: color 0.2s ease;
  animation: fadeUp 0.7s 0.38s cubic-bezier(.22,1,.36,1) both;
}
.back-link:hover { color: var(--red); }
.back-link svg { width: 14px; height: 14px; }

/* ── Corner decorations ── */
.corner {
  position: absolute;
  width: 14px; height: 14px;
  border-color: rgba(201,29,34,0.3);
  border-style: solid;
}
.corner--tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
.corner--tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
.corner--bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
.corner--br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

/* ── Footer ── */
.page-footer {
  position: fixed;
  bottom: 20px;
  left: 0; right: 0;
  text-align: center;
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(255,255,255,0.18);
  letter-spacing: 0.08em;
  z-index: 1;
}

/* ── Responsive ── */
@media (max-width: 520px) {
  .card { padding: 36px 24px; }
  .notify-row { flex-direction: column; }
  .notify-btn { width: 100%; justify-content: center; }
}
@media (max-width: 360px) {
  .card { padding: 28px 16px; }
  .heading { font-size: 18px; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="scan-line"></div>
<div class="glow"></div>

<div class="card">
  <!-- Corner decorations -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Logo -->
  <div class="logo">
    
    Fusion<strong>Thread</strong>
  </div>

  <!-- Icon -->
  <div class="icon-wrap">
    <div class="icon-ring"></div>
    <div class="icon-ring-2"></div>
    <div class="icon-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1" fill="currentColor"/>
      </svg>
    </div>
  </div>

  <!-- Status -->
  <div class="status-tag">
    <div class="blink-dot"></div>
    UNDER CONSTRUCTION
  </div>

  <!-- Heading -->
  <h1 class="heading">Client Portal<br><span>Coming Soon</span></h1>

  <!-- Description -->
  <p class="desc">
    Our secure client login portal is currently being built. 
    We're implementing enterprise-grade authentication and encryption protocols.
  </p>

  <!-- Progress -->
  
  <!-- Info rows -->
  

  <!-- Notify -->
  

  <!-- Back -->
  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    RETURN TO MAIN SITE
  </a>
</div>

<div class="page-footer">CYBERGUARD SECURITY &nbsp;·&nbsp; PORTAL v0.0 &nbsp;·&nbsp; CLASSIFIED</div>

<script>
function handleNotify() {
  const email = document.getElementById('notifyEmail').value.trim();
  const row = document.getElementById('notifyRow');
  const success = document.getElementById('notifySuccess');
  if (!email || !email.includes('@')) {
    document.getElementById('notifyEmail').style.borderColor = 'rgba(201,29,34,0.5)';
    setTimeout(() => document.getElementById('notifyEmail').style.borderColor = '', 1200);
    return;
  }
  row.style.display = 'none';
  success.style.display = 'flex';
}
document.getElementById('notifyEmail').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleNotify();
});
</script>
</body>
</html>
